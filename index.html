<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spider-Verse | @sherikumrishi</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --text-sub: rgba(255, 255, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Prevent bounce and scroll on mobile */
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; position: fixed; }

        #bg-blur {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.2); transition: background-image 1.2s ease; z-index: 0;
        }

        /* 3-Section Layout with Safe Padding */
        main {
            position: relative; z-index: 1; height: 100dvh; width: 100vw;
            display: grid; grid-template-rows: 12% 1fr 12%; 
            align-items: center; justify-items: center;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        #image-info { 
            font-size: 0.6rem; font-weight: 300; letter-spacing: 4px; 
            text-transform: uppercase; color: var(--text-sub); text-align: center; 
            max-width: 80%; line-height: 1.4;
        }

        .stage { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; height: 100%; }

        /* Smaller, Safe-Ratio Frame for Poco X6 and tall devices */
        .image-frame {
            position: relative; 
            width: 65vw; /* Reduced from 75vw */
            aspect-ratio: 16 / 9;
            background: var(--glass); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; 
            padding: 8px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        #loader { position: absolute; width: 20px; height: 20px; border: 2px solid var(--border); border-top: 2px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 5; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        img { max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.8s ease; }
        .show { opacity: 1; }

        .nav-btn { background: transparent; border: 1px solid var(--border); color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .nav-btn svg { width: 14px; fill: rgba(255,255,255,0.7); }

        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.5s ease;
        }

        footer { width: 100%; display: flex; justify-content: center; align-items: center; }
        footer a { color: var(--text-sub); text-decoration: none; font-size: 0.5rem; letter-spacing: 2px; }

        #rotate-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex; } }
        @keyframes rot { 0% {transform:rotate(0deg)} 50%,100% {transform:rotate(-90deg)} }
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div id="start-overlay" onclick="startApp()">
    <p style="letter-spacing: 8px; font-size: 0.75rem;">ENTER SHOWCASE</p>
    <p style="color: var(--text-sub); font-size: 0.45rem; margin-top: 15px;">TAP TO START CINEMATIC MODE</p>
</div>

<div id="rotate-overlay">
    <div style="width:30px;height:50px;border:2px solid #fff;border-radius:4px;animation:rot 2s infinite"></div>
    <p style="margin-top:20px;font-size:0.55rem;letter-spacing:3px;text-align:center;">ROTATE DEVICE<br><span style="color:var(--text-sub); font-size: 0.45rem;">FOR THE FULL EXPERIENCE</span></p>
</div>

<main>
    <div id="image-info">SELECT TO START</div>
    <div class="stage">
        <button class="nav-btn" onclick="nav(-1)"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
        <div class="image-frame"><div id="loader"></div><img id="view" src=""></div>
        <button class="nav-btn" onclick="nav(1)"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
    </div>
    <footer><a href="https://instagram.com/sherikumrishi" target="_blank">MADE BY @SHERIKUMRISHI</a></footer>
</main>

<audio id="track" loop></audio>

<script>
    const images = ["spdr/2 sides of the same coin.png","spdr/42nd & Broadway.png","spdr/acrobatics 1.png","spdr/aint as simple as it looks.png","spdr/creepy crawler.png","spdr/criterion 2.png","spdr/criterion.png","spdr/Divin down.png","spdr/dont mess with the spider.png","spdr/gold n gunz.png","spdr/I HAVE THE POWER!!!.png","spdr/I’m done pulling my punches..png","spdr/its bitsy spider.png","spdr/its in my DNA.png","spdr/kaboom!.png","spdr/last dance.png","spdr/like an angel.png","spdr/look into my eyes.png","spdr/nah ima do my own thing now.png","spdr/no matter how many times i fall i always get back up.png","spdr/nothing personal.png","spdr/one day ima be in the avengers.png","spdr/Parallel Paths.png","spdr/power within.png","spdr/Prowler & Pupil.png","spdr/purple reign.png","spdr/responsibilities.png","spdr/Rise Of Miles.png","spdr/skiing in new york.png","spdr/snowy manhattan.png","spdr/thats all it is a leap of faith.png","spdr/THE BOY WHO GOT BIT BY A SPIDER.png","spdr/THE ENERGY FLOWS.png","spdr/Unstoppable flight.png","spdr/Uptown Pride.png","spdr/was it worth it.png","spdr/world of acrobatics.png","spdr/YN.png"];
    let current = 0, first = true;
    const view = document.getElementById('view'), bg = document.getElementById('bg-blur'), info = document.getElementById('image-info'), track = document.getElementById('track'), ldr = document.getElementById('loader'), start = document.getElementById('start-overlay');

    function startApp() {
        const doc = window.document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        start.style.opacity = '0';
        setTimeout(() => { start.style.display = 'none'; }, 500);
        nav(0); 
    }

    function update() {
        const path = images[current];
        const name = path.split('/').pop().replace(/\.[^/.]+$/, "");
        view.classList.remove('show');
        ldr.style.display = 'block';
        const tempImg = new Image();
        tempImg.src = encodeURI(path);
        tempImg.onload = () => {
            view.src = encodeURI(path);
            bg.style.backgroundImage = `url('${encodeURI(path)}')`;
            info.innerText = name;
            ldr.style.display = 'none';
            view.classList.add('show');
            if (!first) { loadAudio(`audio/${encodeURIComponent(name)}.mp3`); }
        };
    }

    function loadAudio(src) {
        track.pause(); track.src = src; track.load();
        track.addEventListener('canplaythrough', () => { track.play(); }, { once: true });
    }

    function nav(d) {
        if (first) { first = false; track.volume = 1; }
        current = (current + d + images.length) % images.length;
        update();
    }
</script>
</body>
</html>
