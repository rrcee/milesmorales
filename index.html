<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miles Morales | Project Titan</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ee2d2d;
            --secondary: #fecd15;
            --glass: rgba(255, 255, 255, 0.08);
            --blur: blur(20px);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 1. CORE PERFORMANCE (Woz-style) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { width: 100%; height: 100dvh; background: #000; overflow: hidden; position: fixed; }
        
        /* 2. DYNAMIC BACKGROUND */
        #bg-blur {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.4); z-index: 0;
            transition: background-image 0.8s var(--ease);
            will-change: background-image;
        }

        /* 3. THE "STEVE" UI: EDGE-TO-EDGE */
        main {
            position: relative; z-index: 10; height: 100dvh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* FULLSCREEN IMAGE CONTAINER */
        .stage {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .view-container {
            width: 100%; height: 100%; position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        img {
            max-width: 100%; max-height: 100%; width: auto; height: auto;
            object-fit: contain; transform: scale(1.05); opacity: 0;
            transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
            will-change: transform, opacity;
        }
        img.show { opacity: 1; transform: scale(1); }

        /* HUD - MINIMALIST OVERLAY */
        .hud {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; transition: opacity 0.4s var(--ease);
        }

        /* MISSION TITLE - FLOATING */
        #image-info {
            pointer-events: auto; font-family: 'Inter', sans-serif;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            font-size: clamp(0.7rem, 2vw, 0.9rem); color: #fff;
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 12px 24px; border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            align-self: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 20px; text-align: center;
        }

        /* NEO-BRUTALIST OVERRIDES */
        body[data-theme="neo"] { background: #FFFDF5; }
        body[data-theme="neo"] #bg-blur { opacity: 0; }
        body[data-theme="neo"] #image-info {
            font-family: 'Space Grotesk'; font-weight: 900; background: var(--secondary);
            color: #000; border: 4px solid #000; border-radius: 0; transform: rotate(-1.5deg);
            box-shadow: 6px 6px 0 #000; letter-spacing: 0; font-size: 1.2rem;
        }

        /* 4. GHOST NAVIGATION (Invisible Click Zones) */
        .nav-zone {
            position: absolute; top: 0; bottom: 0; width: 25%; z-index: 50;
            cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center;
        }
        .nav-zone.left { left: 0; }
        .nav-zone.right { right: 0; }
        .nav-hint { width: 50px; height: 50px; opacity: 0; transition: 0.3s; color: white; }
        .nav-zone:hover .nav-hint { opacity: 0.4; }

        /* TOP CONTROLS */
        .top-bar {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            display: flex; gap: 15px; pointer-events: auto;
        }
        .btn-circle {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: var(--glass); backdrop-filter: var(--blur);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn-circle:active { transform: scale(0.9); }

        /* 5. START OVERLAY */
        #start {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.8s var(--ease);
        }
        #start h1 { font-family: 'Space Grotesk'; font-size: 15vw; line-height: 0.8; color: #fff; text-align: center; }

        /* FOCUS MODE */
        body.focus-mode .hud, body.focus-mode .top-bar { opacity: 0; }
    </style>
</head>
<body data-theme="cinematic">

<div id="bg-blur"></div>

<div id="start" onclick="init()">
    <h1 style="color: var(--accent);">MILES</h1>
    <h1 style="margin-bottom: 20px;">MORALES</h1>
    <p style="letter-spacing: 5px; color: rgba(255,255,255,0.4); font-size: 0.7rem; font-weight: 700;">ENTER THE SPIDER-VERSE</p>
</div>

<div class="top-bar">
    <button class="btn-circle" onclick="toggleTheme()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></button>
    <button class="btn-circle" onclick="toggleMute()"><svg id="spk" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"></path></svg></button>
</div>

<main>
    <div class="nav-zone left" onclick="nav(-1)"><svg class="nav-hint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="nav-zone right" onclick="nav(1)"><svg class="nav-hint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg></div>

    <div class="stage">
        <div class="view-container">
            <img id="view" src="">
        </div>
    </div>

    <div class="hud">
        <div id="image-info">SELECT MISSION</div>
        <footer style="align-self: center; font-size: 0.6rem; letter-spacing: 3px; opacity: 0.3; color: #fff; font-weight: 700;">@SHERIKUMRISHI</footer>
    </div>
</main>

<audio id="track" loop></audio>

<script>
    const images = ["2 sides of the same coin.png", "42nd & Broadway.png", "acrobatics 1.png", "aint as simple as it looks.png", "creepy crawler.png", "criterion 2.png", "criterion.png", "Divin down.png", "dont mess with the spider.png", "gold n gunz.png", "I HAVE THE POWER!!!.png", "I’m done pulling my punches..png", "its bitsy spider.png", "its in my DNA.png", "kaboom!.png", "last dance.png", "like an angel.png", "look into my eyes.png", "nah ima do my own thing now.png", "no matter how many times i fall i always get back up.png", "nothing personal.png", "one day ima be in the avengers.png", "Parallel Paths.png", "power within.png", "Prowler & Pupil.png", "purple reign.png", "responsibilities.png", "Rise Of Miles.png", "skiing in new york.png", "snowy manhattan.png", "thats all it is a leap of faith.png", "THE BOY WHO GOT BIT BY A SPIDER.png", "THE ENERGY FLOWS.png", "Unstoppable flight.png", "Uptown Pride.png", "was it worth it.png", "world of acrobatics.png", "YN.png"];
    const palettes = [["#cf4d3f", "#dce05e"], ["#c7d350", "#24275f"], ["#ed2c2c", "#1a1b26"], ["#ee2d2c", "#1a1b26"], ["#c12d2b", "#1a1b26"], ["#ee2d2d", "#1a1b26"], ["#ed2e2d", "#1a1b26"], ["#f11c1b", "#24275f"], ["#d83c19", "#966407"], ["#966407", "#e4c66e"], ["#f80d0c", "#fecd15"], ["#e6170b", "#966407"], ["#be7ce3", "#8117e3"], ["#ee2d2d", "#1a1b26"], ["#ee1e1e", "#fecd15"], ["#8117e3", "#be7ce3"], ["#92550d", "#ff1300"], ["#ff1300", "#1a1b26"], ["#d5653a", "#ab43be"], ["#ab43be", "#8117e3"], ["#b3cd32", "#364a61"], ["#364a61", "#b3cd32"], ["#dce05e", "#cf4d3f"], ["#1315cd", "#f02b2b"], ["#51348c", "#1e1746"], ["#1e1746", "#51348c"], ["#f02b2b", "#182227"], ["#e4c66e", "#f02b2b"], ["#24275f", "#eb2c2c"], ["#72b3c7", "#ee2d2d"], ["#364f98", "#e9302e"], ["#fecd15", "#419d7f"], ["#99c11f", "#c82727"], ["#929da5", "#da4647"], ["#3b535f", "#ee2d2d"], ["#f25b69", "#ca2741"], ["#757383", "#ee2d2d"], ["#7da324", "#de5024"]];

    let current = 0, first = true, isMuted = false;
    const view = document.getElementById('view'), bg = document.getElementById('bg-blur'), track = document.getElementById('track'), info = document.getElementById('image-info');

    // Preload Logic (Woz Performance Tip)
    function preload(idx) {
        if(idx < images.length) {
            const img = new Image();
            img.src = `spdr/${encodeURIComponent(images[idx])}`;
        }
    }

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        document.body.setAttribute('data-theme', currentTheme === 'cinematic' ? 'neo' : 'cinematic');
        update(true);
    }

    function init() {
        document.getElementById('start').style.opacity = '0';
        setTimeout(() => document.getElementById('start').style.display = 'none', 800);
        nav(0);
    }

    function update(themeOnly = false) {
        const fileName = images[current];
        const [c1, c2] = palettes[current];
        const baseName = fileName.substring(0, fileName.lastIndexOf('.'));
        
        // 1. Instant Text Update
        info.innerText = baseName;
        document.documentElement.style.setProperty('--accent', c1);
        document.documentElement.style.setProperty('--secondary', c2);

        if(document.body.getAttribute('data-theme') === 'neo') {
            info.style.color = isDark(c2) ? "#fff" : "#000";
        } else { info.style.color = "#fff"; }

        if(themeOnly) return;

        // 2. Performance Loading
        view.classList.remove('show');
        
        const path = `spdr/${encodeURIComponent(fileName)}`;
        const aPath = `audio/${encodeURIComponent(baseName)}.mp3`;

        // Wait for tiny exit transition
        setTimeout(() => {
            view.src = path;
            bg.style.backgroundImage = `url('${path}')`;
            view.onload = () => {
                view.classList.add('show');
                preload(current + 1); // Preload next
            }

            if (!first) {
                if (track.src.indexOf(encodeURIComponent(baseName)) === -1) {
                    track.src = aPath;
                    if (!isMuted) track.play().catch(()=>{});
                }
            }
        }, 100);
    }

    function isDark(color) {
        const hex = color.replace('#', '');
        const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
        return ((r * 299 + g * 587 + b * 114) / 1000) < 128;
    }

    function nav(d) { if (first) first = false; current = (current + d + images.length) % images.length; update(); }
    function toggleMute() { 
        isMuted = !isMuted; 
        track.muted = isMuted; 
        document.getElementById('spk').style.opacity = isMuted ? 0.3 : 1; 
        if(!isMuted && track.paused && !first) track.play();
    }

    // GESTURES & KEYS
    window.addEventListener('keydown', e => { if(e.key === "ArrowRight") nav(1); if(e.key === "ArrowLeft") nav(-1); });

    // Focus Mode (Jobs' Clean UI)
    let touchTimer;
    const fOn = () => touchTimer = setTimeout(() => document.body.classList.add('focus-mode'), 400);
    const fOff = () => { clearTimeout(touchTimer); document.body.classList.remove('focus-mode'); };
    document.addEventListener('touchstart', fOn); document.addEventListener('touchend', fOff);
    document.addEventListener('mousedown', fOn); document.addEventListener('mouseup', fOff);
</script>
</body>
</html>
