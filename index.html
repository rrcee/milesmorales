<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miles Morales | Titan V-Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FFFDF5; --accent: #FF6B6B; --secondary: #FFD93D; --ink: #000000; 
            --ease-snap: cubic-bezier(0.8, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100dvh; overflow: hidden; background-color: var(--bg); }

        .bg-grid {
            position: fixed; inset: 0;
            background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
            background-size: 35px 35px; z-index: 0; opacity: 0.15;
            animation: gridDrift 20s linear infinite;
        }
        @keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: -70px 70px; } }

        /* --- ORIENTATION GUARD --- */
        #rotate-notice {
            position: fixed; inset: 0; background: var(--accent); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            border: 12px solid var(--ink);
        }
        @media (orientation: portrait) { #rotate-notice { display: flex; } }

        .phone-icon {
            width: 70px; height: 120px; border: 6px solid var(--ink); border-radius: 12px;
            background: #fff; position: relative;
            animation: flipPhone 2s var(--ease-snap) infinite;
            box-shadow: 10px 10px 0 var(--ink); margin-bottom: 40px;
        }
        .phone-icon::after {
            content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 14px; border: 4px solid var(--ink); border-radius: 50%;
        }
        @keyframes flipPhone { 0%, 20% { transform: rotate(0deg); } 80%, 100% { transform: rotate(-90deg); } }

        /* --- UI ELEMENTS --- */
        .top-ui { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        
        .bottom-ui { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: var(--ink); display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; z-index: 1000; border-top: 4px solid var(--secondary);
        }
        #image-info { color: white; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .credit-link {
            background: var(--accent); color: var(--ink); padding: 5px 15px;
            font-weight: 900; font-size: 0.9rem; text-decoration: none; border: 3px solid var(--ink);
            box-shadow: 4px 4px 0 white; text-transform: uppercase; white-space: nowrap;
            transition: 0.2s var(--ease-bounce); animation: pulseWarning 3s infinite;
        }
        .credit-link:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 white; }
        .credit-link:active { transform: translate(4px, 4px); box-shadow: 0 0 0 white; }
        @keyframes pulseWarning { 0%, 100% { background: var(--accent); } 50% { background: var(--secondary); } }

        .vol-toggle { 
            width: 55px; height: 55px; background: white; border: 4px solid var(--ink); 
            box-shadow: 6px 6px 0 var(--ink); display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.2s var(--ease-bounce);
        }
        .vol-toggle:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--ink); }
        .vol-toggle:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--ink); }

        /* --- THE RESPONSIVE STAGE --- */
        main { position: relative; z-index: 10; height: calc(100dvh - 60px); width: 100%; display: flex; align-items: center; justify-content: center; }

        .gallery-container { display: flex; align-items: center; justify-content: center; gap: 30px; width: 100%; padding: 0 15px; }

        .stage { 
            position: relative; 
            /* THE FIX: Anchor by height, cap the width */
            height: 65dvh; 
            width: auto;
            max-width: 70vw; 
            aspect-ratio: 16 / 9;
            
            background: #fff; border: 6px solid var(--ink); box-shadow: 16px 16px 0 var(--ink); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            transition: transform 0.3s var(--ease-snap);
        }

        .stage::after {
            content: "DECODING SIGNAL..."; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 900; font-size: 1.5rem; color: var(--ink); opacity: 0; transition: opacity 0.2s; letter-spacing: 4px; text-align: center;
        }
        .stage.loading::after { opacity: 1; animation: glitchText 0.3s infinite; }
        @keyframes glitchText {
            0% { transform: translate(-50%, -50%) skew(0deg); }
            20% { transform: translate(-52%, -50%) skew(-5deg); color: var(--accent); }
            40% { transform: translate(-48%, -50%) skew(5deg); color: var(--ink); }
            60% { transform: translate(-50%, -52%) skew(0deg); color: var(--secondary); }
            80% { transform: translate(-50%, -48%) skew(0deg); color: var(--ink); }
        }

        #view { width: 100%; height: 100%; object-fit: cover; opacity: 0; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.4s var(--ease-bounce); z-index: 2; }
        #view.show { opacity: 1; transform: scale(1); }

        /* --- NAVIGATION BUTTONS --- */
        .nav-btn {
            background: white; border: 4px solid var(--ink); color: var(--ink);
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 6px 6px 0 var(--ink); flex-shrink: 0; transition: 0.2s var(--ease-bounce);
        }
        .nav-btn:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0 var(--ink); background: var(--secondary); }
        .nav-btn:active { transform: translate(6px, 6px); box-shadow: 0 0 0 var(--ink); background: var(--accent); color: white; }

        /* --- MOBILE LANDSCAPE OVERRIDES --- */
        @media (max-width: 950px) and (orientation: landscape) {
            .bottom-ui { height: 40px; padding: 0 10px; border-top: 3px solid var(--secondary); }
            main { height: calc(100dvh - 40px); }
            
            /* Aggressively shrink stage height so it never clips */
            .stage { height: 60dvh; max-width: 65vw; border-width: 4px; box-shadow: 8px 8px 0 var(--ink); }
            
            .gallery-container { gap: 15px; }
            .nav-btn { width: 45px; height: 45px; border-width: 3px; box-shadow: 4px 4px 0 var(--ink); }
            .nav-btn svg { width: 22px; }
            
            .top-ui { top: 10px; right: 10px; }
            .vol-toggle { width: 40px; height: 40px; border-width: 3px; box-shadow: 4px 4px 0 var(--ink); }
            .vol-toggle svg { width: 20px; }
            
            #image-info { font-size: 0.8rem; letter-spacing: 1px; }
            .credit-link { font-size: 0.6rem; padding: 3px 8px; border-width: 2px; box-shadow: 2px 2px 0 white; }
            .stage::after { font-size: 1rem; }
        }

        #start-overlay { 
            position: fixed; inset: 0; background: var(--secondary); z-index: 9000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; border: 15px solid var(--ink); transition: transform 0.6s var(--ease-snap);
        }
        #start-overlay:hover h1 { transform: scale(1.05) rotate(-2deg); }
        #start-overlay h1 { font-size: 15vw; color: white; -webkit-text-stroke: 4px var(--ink); text-shadow: 10px 10px 0 var(--ink); transition: 0.3s var(--ease-bounce); }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div id="rotate-notice">
    <div class="phone-icon"></div>
    <h2 style="font-size: 2.5rem; font-weight: 900; color: var(--ink); text-transform: uppercase; letter-spacing: -1px; text-shadow: 3px 3px 0 white;">Rotate Device</h2>
    <p style="font-weight: 700; color: var(--ink); margin-top: 10px; background: white; padding: 5px 15px; border: 3px solid var(--ink);">LANDSCAPE REQUIRED</p>
</div>

<div id="start-overlay" onclick="initiateTitan()">
    <h1>ENTER</h1>
</div>

<div class="top-ui">
    <div class="vol-toggle" onclick="toggleVolume()">
        <svg id="vol-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="black" stroke-width="3">
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        </svg>
    </div>
</div>

<main>
    <div class="gallery-container">
        <button class="nav-btn" onclick="nav(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="30"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <div class="stage" id="main-stage"><img id="view" src=""></div>
        <button class="nav-btn" onclick="nav(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="30"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
    </div>
</main>

<div class="bottom-ui">
    <div id="image-info">STANDBY...</div>
    <a href="https://instagram.com/sherikumrishi" target="_blank" class="credit-link">Photography by @sherikumrishi</a>
</div>

<audio id="track" loop></audio>

<script>
    const images = ["Rise Of Miles.png", "responsibilities.png", "Uptown Pride.png", "Unstoppable flight.png", "THE ENERGY FLOWS.png", "purple reign.png", "last dance.png", "criterion.png", "kaboom!.png", "thats all it is a leap of faith.png", "Parallel Paths.png", "one day ima be in the avengers.png", "no matter how many times i fall i always get back up.png", "nothing personal.png", "its in my DNA.png", "its bitsy spider.png", "I’m done pulling my punches..png", "dont mess with the spider.png", "Divin down.png", "acrobatics 1.png", "world of acrobatics.png", "power within.png", "I HAVE THE POWER!!!.png", "gold n gunz.png", "was it worth it.png", "42nd & Broadway.png", "snowy manhattan.png", "skiing in new york.png", "criterion 2.png", "look into my eyes.png", "2 sides of the same coin.png", "aint as simple as it looks.png", "creepy crawler.png", "like an angel.png", "nah ima do my own thing now.png", "Prowler & Pupil.png", "THE BOY WHO GOT BIT BY A SPIDER.png", "YN.png"];

    let current = 0, first = true, isMuted = false;
    const view = document.getElementById('view'), info = document.getElementById('image-info'), track = document.getElementById('track'), stage = document.getElementById('main-stage');

    async function lockScreen() {
        try {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch (err) { console.log("Orientation lock denied, relying on CSS guard."); }
    }

    function initiateTitan() { 
        document.getElementById('start-overlay').style.transform = 'translateY(-100%)'; 
        lockScreen();
        nav(0); 
    }

    document.addEventListener('click', () => { if(!first && !document.fullscreenElement) lockScreen(); });

    function update() {
        const file = images[current];
        const base = file.substring(0, file.lastIndexOf('.'));
        
        view.classList.remove('show');
        stage.classList.add('loading');
        info.innerText = "DECODING...";

        const nextImg = new Image();
        nextImg.src = `spdr/${encodeURIComponent(file)}`;
        
        nextImg.onload = () => {
            view.src = nextImg.src;
            stage.classList.remove('loading');
            view.classList.add('show');
            info.innerText = base;
            
            if (!first) {
                track.src = `audio/${encodeURIComponent(base)}.mp3`;
                if (!isMuted) track.play().catch(()=>{});
            }
        };
    }

    function nav(d) { if (first) first = false; current = (current + d + images.length) % images.length; update(); }
    function toggleVolume() { isMuted = !isMuted; track.muted = isMuted; document.getElementById('vol-icon').style.opacity = isMuted ? 0.3 : 1; }
</script>
</body>
</html>
