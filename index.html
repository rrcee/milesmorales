<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Rio Morales</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:black;
overflow:hidden;
color:white;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
animation:fadeOut 2s ease forwards;
animation-delay:3s;
}

#intro h1{
font-size:3rem;
letter-spacing:4px;
opacity:0;
animation:introText 2.5s ease forwards;
}

@keyframes introText{
to{opacity:1;}
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

/* BACKGROUND */
.background{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
filter:blur(30px) brightness(0.45);
transform:scale(1.2);
transition:background-image 0.6s ease;
}

/* GRADIENT OVERLAY */
.gradient{
position:fixed;
inset:0;
background:linear-gradient(135deg,#000,#111);
mix-blend-mode:overlay;
transition:background 0.6s ease;
}

/* CONTAINER */
.container{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* FRAME */
.frame{
position:relative;
max-width:95vw;
max-height:85vh;
overflow:hidden;
border-radius:20px;
box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

/* Dual Image Transition */
.frame img{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
transition:opacity 0.8s ease, transform 0.8s ease;
}

#imgTop{
opacity:1;
z-index:2;
}

#imgBottom{
opacity:0;
z-index:1;
}

/* CONTROLS */
.controls{
position:absolute;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
z-index:3;
}

button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
color:white;
font-size:18px;
padding:12px 18px;
border-radius:50px;
cursor:pointer;
transition:0.3s ease;
}

button:hover{
background:rgba(255,255,255,0.3);
}

/* MOBILE */
@media (max-width:768px){
.frame{
max-width:100%;
max-height:75vh;
}
button{
font-size:15px;
padding:10px 14px;
}
}
</style>
</head>
<body>

<div id="intro">
<h1>PROJECT RIO MORALES</h1>
</div>

<div class="background" id="bg"></div>
<div class="gradient" id="gradient"></div>

<div class="container">
<div class="controls">
<button onclick="prevImage()">◀</button>
<button onclick="nextImage()">▶</button>
</div>

<div class="frame">
<img id="imgBottom">
<img id="imgTop">
</div>
</div>

<audio id="audioPlayer"></audio>

<script>

/* EDIT THIS ARRAY TO MATCH YOUR IMAGES */
const slides = [
{
file:"spdr/1.jpg",
gradient:"linear-gradient(135deg,#ff416c,#ff4b2b)"
},
{
file:"spdr/2.jpg",
gradient:"linear-gradient(135deg,#1e3c72,#2a5298)"
},
{
file:"spdr/3.jpg",
gradient:"linear-gradient(135deg,#11998e,#38ef7d)"
},
{
file:"spdr/4.jpg",
gradient:"linear-gradient(135deg,#8e2de2,#4a00e0)"
}
];

let index = 0;
const imgTop = document.getElementById("imgTop");
const imgBottom = document.getElementById("imgBottom");
const bg = document.getElementById("bg");
const gradient = document.getElementById("gradient");
const audioPlayer = document.getElementById("audioPlayer");

/* AUTO AUDIO MAPPING */
function getAudioPath(imagePath){
let name = imagePath.split("/").pop().split(".")[0];
return "audio/" + name + ".mp3";
}

function updateSlide(){

let slide = slides[index];

imgBottom.src = imgTop.src;
imgBottom.style.opacity = 1;

imgTop.src = slide.file;
imgTop.style.opacity = 0;

setTimeout(()=>{
imgTop.style.opacity = 1;
imgBottom.style.opacity = 0;
},50);

bg.style.backgroundImage = `url(${slide.file})`;
gradient.style.background = slide.gradient;

/* AUDIO */
audioPlayer.pause();
audioPlayer.src = getAudioPath(slide.file);
audioPlayer.play().catch(()=>{});
}

function nextImage(){
index = (index + 1) % slides.length;
updateSlide();
}

function prevImage(){
index = (index - 1 + slides.length) % slides.length;
updateSlide();
}

/* INITIAL LOAD */
imgTop.src = slides[0].file;
bg.style.backgroundImage = `url(${slides[0].file})`;
gradient.style.background = slides[0].gradient;
audioPlayer.src = getAudioPath(slides[0].file);

</script>

</body>
</html>
