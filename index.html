<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miles Morales | 16:9 Symmetry</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FFFDF5; 
            --accent: #FF6B6B; 
            --secondary: #FFD93D; 
            --ink: #000000; 
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100dvh; overflow: hidden; background-color: var(--bg); }

        /* GRID BACKGROUND */
        .bg-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* ORIENTATION GUARD */
        #rotate-notice {
            position: fixed; inset: 0; background: var(--ink); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: portrait) { #rotate-notice { display: flex; } }

        /* HEADER UI */
        .top-ui { 
            position: fixed; top: 30px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 0 40px; z-index: 1000; pointer-events: none; 
        }
        
        #image-info { 
            background: var(--secondary); padding: 12px 30px; border: 4px solid var(--ink);
            box-shadow: 8px 8px 0 var(--ink); font-weight: 900; font-size: 1.4rem;
            text-transform: uppercase; transform: rotate(-1.5deg); pointer-events: auto;
        }

        .vol-toggle { 
            pointer-events: auto; width: 60px; height: 60px; background: var(--accent); 
            border: 4px solid var(--ink); box-shadow: 6px 6px 0 var(--ink);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* THE SYMMETRICAL STAGE */
        main { 
            position: relative; z-index: 10; height: 100dvh; width: 100%; 
            display: flex; align-items: center; justify-content: center; 
            padding: 20px;
        }

        .gallery-container {
            display: flex; align-items: center; justify-content: center;
            gap: 40px; /* Adjust this to move buttons closer/further from frame */
            width: 100%;
        }

        .stage { 
            position: relative; 
            width: 70vw; /* Keeps the 25%ish side buffer */
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #fff; 
            border: 6px solid var(--ink); 
            box-shadow: 20px 20px 0 var(--ink); 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        #view { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s var(--ease); }
        #view.show { opacity: 1; }

        /* THEMED NAVIGATION */
        .nav-btn {
            background: white; border: 4px solid var(--ink); color: var(--ink);
            width: 65px; height: 65px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 6px 6px 0 var(--ink); transition: 0.1s;
            flex-shrink: 0; /* Prevents buttons from squishing */
        }
        .nav-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--ink); }
        .nav-btn svg { width: 30px; height: 30px; stroke-width: 4px; }

        /* OVERLAYS */
        #start-overlay { 
            position: fixed; inset: 0; background: var(--accent); z-index: 9000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; border: 12px solid var(--ink); transition: 0.8s var(--ease);
        }
        #start-overlay h1 { font-size: 10vw; color: white; -webkit-text-stroke: 3px var(--ink); line-height: 0.8; text-align: center; }

        @media (max-width: 768px) {
            .gallery-container { gap: 15px; }
            .nav-btn { width: 50px; height: 50px; }
            .stage { width: 80vw; }
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div id="rotate-notice">
    <h2 style="font-size: 2rem; font-weight: 900;">LANDSCAPE MODE ONLY</h2>
</div>

<div id="start-overlay" onclick="startApp()">
    <h1>MILES<br>MORALES</h1>
    <div style="background: white; border: 4px solid #000; padding: 15px 40px; margin-top: 40px; font-weight: 900; box-shadow: 10px 10px 0px 0px #000;">
        START MISSION
    </div>
</div>

<div class="top-ui">
    <div id="image-info">HUB ACTIVE</div>
    <div class="vol-toggle" onclick="toggleVolume()">
        <svg id="vol-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="3">
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path id="vol-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
    </div>
</div>

<main>
    <div class="gallery-container">
        <button class="nav-btn" onclick="nav(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>

        <div class="stage">
            <img id="view" src="">
        </div>

        <button class="nav-btn" onclick="nav(1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>
</main>

<audio id="track" loop></audio>

<script>
    const images = ["Rise Of Miles.png", "responsibilities.png", "Uptown Pride.png", "Unstoppable flight.png", "THE ENERGY FLOWS.png", "purple reign.png", "last dance.png", "criterion.png", "kaboom!.png", "thats all it is a leap of faith.png", "Parallel Paths.png", "one day ima be in the avengers.png", "no matter how many times i fall i always get back up.png", "nothing personal.png", "its in my DNA.png", "its bitsy spider.png", "I’m done pulling my punches..png", "dont mess with the spider.png", "Divin down.png", "acrobatics 1.png", "world of acrobatics.png", "power within.png", "I HAVE THE POWER!!!.png", "gold n gunz.png", "was it worth it.png", "42nd & Broadway.png", "snowy manhattan.png", "skiing in new york.png", "criterion 2.png", "look into my eyes.png", "2 sides of the same coin.png", "aint as simple as it looks.png", "creepy crawler.png", "like an angel.png", "nah ima do my own thing now.png", "Prowler & Pupil.png", "THE BOY WHO GOT BIT BY A SPIDER.png", "YN.png"];

    let current = 0, first = true, isMuted = false;
    const view = document.getElementById('view'), info = document.getElementById('image-info'), track = document.getElementById('track'), start = document.getElementById('start-overlay');

    function startApp() {
        start.style.transform = 'translateY(-100%)';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
        nav(0);
    }

    function toggleVolume() {
        isMuted = !isMuted;
        track.muted = isMuted;
        document.getElementById('vol-waves').style.display = isMuted ? 'none' : 'block';
        document.getElementById('vol-icon').style.stroke = isMuted ? "rgba(255,255,255,0.3)" : "white";
        if(!isMuted) track.play().catch(()=>{});
    }

    function update() {
        const fileName = images[current];
        const baseName = fileName.substring(0, fileName.lastIndexOf('.'));
        view.classList.remove('show');
        
        setTimeout(() => {
            view.src = `spdr/${encodeURIComponent(fileName)}`;
            info.innerText = baseName;
            info.style.transform = `rotate(${Math.random() * 4 - 2}deg)`;
            
            view.onload = () => {
                view.classList.add('show');
                if (!first) {
                    track.src = `audio/${encodeURIComponent(baseName)}.mp3`;
                    if (!isMuted) track.play().catch(() => {});
                }
            };
        }, 200);
    }

    function nav(d) { if (first) first = false; current = (current + d + images.length) % images.length; update(); }
</script>
</body>
</html>
